
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas Zener — Morgana</title>

<style>

body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #f6f1ea, #e8dfd2);
  text-align: center;
  color: #3a2f2f;
}

/* Logo */
.logo {
  max-width: 120px;
  margin: 15px auto;
}

/* Símbolos */
.symbols {
  font-size: 22px;
  letter-spacing: 10px;
  margin-bottom: 10px;
}

.symbols span:nth-child(1) { color: gold; }
.symbols span:nth-child(2) { color: red; }
.symbols span:nth-child(3) { color: cyan; }
.symbols span:nth-child(4) { color: black; }
.symbols span:nth-child(5) { color: green; }

/* Título */
h1 {
  font-size: 22px;
  margin: 5px 0;
}

/* BOTONES */
.buttons {
  margin: 30px 0;
}

.btn {
  display: block;
  width: 80%;
  max-width: 300px;
  margin: 15px auto;
  padding: 18px;
  font-size: 18px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* Leer online */
.read {
  background: #8c78b4;
}

/* Descargar */
.download {
  background: #b48c5a;
}

/* Viewer SOLO PC */
.viewer {
  display: none;
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
}

</style>
</head>

<body>

<img src="logo-morgana.png" class="logo">

<div class="symbols">
  <span>●</span>
  <span>✚</span>
  <span>≈</span>
  <span>■</span>
  <span>★</span>
</div>

<h1>CARTAS ZENER</h1>

<div class="buttons" id="buttons">
  <a href="INSTRUCCIONES.pdf" class="btn read">Leer online</a>
  <a href="INSTRUCCIONES.pdf" class="btn download" download>Descargar</a>
</div>

<div class="viewer" id="viewer">
  <iframe src="INSTRUCCIONES.pdf#zoom=page-width"></iframe>
</div>

<script>
function esMovil() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (!esMovil()) {
  // En PC mostramos visor
  document.getElementById("viewer").style.display = "block";
  document.getElementById("buttons").style.display = "none";
}
</script>

</body>
</html>

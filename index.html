<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- CLAVE PARA CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cartas Zener — Morgana</title>

<style>

body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #f6f1ea, #e8dfd2);
  color: #3a2f2f;
}

/* Fondo sutil */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle at center, rgba(140, 120, 180, 0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Logo */
.logo {
  display: block;
  margin: 10px auto;
  max-width: 120px;
}

/* Título */
h1 {
  text-align: center;
  font-size: 24px;
  margin: 5px 0;
  letter-spacing: 2px;
}

/* Subtítulo */
h2 {
  text-align: center;
  font-size: 14px;
  margin: 0 0 10px;
  opacity: 0.8;
}

/* Símbolos */
.symbols {
  text-align: center;
  font-size: 20px;
  margin-bottom: 5px;
  letter-spacing: 10px;
}

.symbols span:nth-child(1) { color: gold; }
.symbols span:nth-child(2) { color: red; }
.symbols span:nth-child(3) { color: cyan; }
.symbols span:nth-child(4) { color: black; }
.symbols span:nth-child(5) { color: green; }

/* Contenedor PDF */
.viewer {
  width: 100%;
  height: calc(100vh - 160px);
  margin: 0;
}

/* PDF */
iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.6;
  padding: 5px;
}

</style>
</head>

<body>

<img src="logo-morgana.png" class="logo">

<div class="symbols">
  <span>●</span>
  <span>✚</span>
  <span>≈</span>
  <span>■</span>
  <span>★</span>
</div>

<h1>CARTAS ZENER</h1>
<h2>Percepción extrasensorial</h2>

<div class="viewer">
  <iframe src="INSTRUCCIONES.pdf#zoom=page-width"></iframe>
</div>

<div class="footer">
Morgana — símbolos, percepción y práctica
</div>

</body>
</html>

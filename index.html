<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas Zener — Morgana</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #f6f1ea, #e8dfd2);
  text-align: center;
}

/* Logo */
.logo {
  max-width: 120px;
  margin: 10px auto;
}

/* Símbolos */
.symbols {
  font-size: 20px;
  letter-spacing: 10px;
}

.symbols span:nth-child(1) { color: gold; }
.symbols span:nth-child(2) { color: red; }
.symbols span:nth-child(3) { color: cyan; }
.symbols span:nth-child(4) { color: black; }
.symbols span:nth-child(5) { color: green; }

/* Visor */
.viewer {
  width: 100%;
  height: calc(100vh - 140px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Botón fallback */
.open-btn {
  display: none;
  margin: 30px auto;
  padding: 15px 25px;
  font-size: 16px;
  background: #8c78b4;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

</style>
</head>

<body>

<img src="logo-morgana.png" class="logo">

<div class="symbols">
  <span>●</span>
  <span>✚</span>
  <span>≈</span>
  <span>■</span>
  <span>★</span>
</div>

<h2>Cartas Zener</h2>

<div class="viewer" id="viewer">
  <iframe src="INSTRUCCIONES.pdf#zoom=page-width"></iframe>
</div>

<a href="INSTRUCCIONES.pdf" class="open-btn" id="openBtn">
Abrir guía completa
</a>

<script>
function esMovil() {
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (esMovil()) {
  // Oculta iframe
  document.getElementById("viewer").style.display = "none";

  // Muestra botón
  document.getElementById("openBtn").style.display = "inline-block";

  // Redirige automáticamente (opcional)
  window.location.href = "INSTRUCCIONES.pdf";
}
</script>

</body>
</html>
